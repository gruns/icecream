[tox]
envlist = py27, py35, py36, py37, py38, py39, pypy, pypy3

[testenv]
deps =
    nose
commands =
    nosetests --exe []

[testenv:py39]
deps =
    {[testenv]deps}
    mypy

commands =
    nosetests --exe []
    python3 -m mypy --install-types --non-interactive
    python3 -m mypy.stubtest --ignore-missing-stub icecream
